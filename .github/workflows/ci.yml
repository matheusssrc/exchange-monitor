name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: trillia
          POSTGRES_PASSWORD: trillia
          POSTGRES_DB: trillia
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U trillia" --health-interval 5s
          --health-timeout 3s --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check src tests
      - name: Ruff format check
        run: ruff format --check src tests
      - name: Mypy
        run: mypy src
      - name: Tests (unit + integration)
        env:
          TRILLIA_DATABASE_URL: postgresql+asyncpg://trillia:trillia@localhost:5432/trillia
        run: pytest --cov=trillia_monitor --cov-report=term-missing --cov-fail-under=85

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build --target runtime -t trillia-backend:ci ./backend
      - name: Build frontend image
        run: docker build -t trillia-frontend:ci ./frontend
      - name: Build Airflow image
        run: docker build -f airflow/Dockerfile -t trillia-airflow:ci .

  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.5"
      - name: Format check
        run: terraform fmt -check -recursive
      - name: Init
        run: terraform init -backend=false
      - name: Validate
        run: terraform validate
