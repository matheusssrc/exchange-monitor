name: trillia-exchange-monitor

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trillia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trillia}
      POSTGRES_DB: ${POSTGRES_DB:-trillia}
    ports: ["5432:5432"]
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trillia} -d ${POSTGRES_DB:-trillia}"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: ./backend
      target: runtime
    command: ["migrate"]
    environment:
      TRILLIA_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-trillia}:${POSTGRES_PASSWORD:-trillia}@db:5432/${POSTGRES_DB:-trillia}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ./backend
      target: runtime
    command: ["api", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      TRILLIA_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-trillia}:${POSTGRES_PASSWORD:-trillia}@db:5432/${POSTGRES_DB:-trillia}
      TRILLIA_MONITORED_PAIRS: ${TRILLIA_MONITORED_PAIRS:-BRL-USD,BRL-EUR,BRL-ARS,BRL-UYU,USD-BRL,USD-EUR,USD-ARS,USD-UYU}
      TRILLIA_LOG_LEVEL: ${TRILLIA_LOG_LEVEL:-INFO}
      TRILLIA_CORS_ALLOW_ORIGINS: '["http://localhost:5173","http://localhost:8080"]'
    ports: ["8000:8000"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  airflow-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      timeout: 3s
      retries: 10

  airflow-init:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    entrypoint: /bin/bash
    command:
      - -c
      - >
        airflow db migrate &&
        airflow users create --username admin --password admin
        --firstname Matheus --lastname Trillia --role Admin --email admin@trillia.local
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      TRILLIA_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-trillia}:${POSTGRES_PASSWORD:-trillia}@db:5432/${POSTGRES_DB:-trillia}
      TRILLIA_MONITORED_PAIRS: ${TRILLIA_MONITORED_PAIRS:-BRL-USD,BRL-EUR,BRL-ARS,BRL-UYU,USD-BRL,USD-EUR,USD-ARS,USD-UYU}
      TRILLIA_POLLING_INTERVAL_SECONDS: ${TRILLIA_POLLING_INTERVAL_SECONDS:-30}
      TRILLIA_LOG_LEVEL: ${TRILLIA_LOG_LEVEL:-INFO}
    depends_on:
      airflow-db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: "no"

  airflow-scheduler:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    command: ["scheduler"]
    environment: *airflow-env
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-webserver:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    command: ["webserver"]
    environment: *airflow-env
    ports: ["8081:8080"]
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    ports: ["8080:80"]
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.0
    profiles: ["observability"]
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]
    depends_on:
      - api

volumes:
  db_data:
  airflow_db_data:
